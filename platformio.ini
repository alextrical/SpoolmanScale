; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
name = "SpoolmanScale"
description = "SpoolmanScale"
default_envs = wt32-sc01-plus

[env]
platform = espressif32@6.7.0
framework = arduino
monitor_speed = 115200
build_flags = 
	-DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude
build_src_filter = +<*> +<../lib/fonts/*.c>
; Libraries
lib_deps =
    lvgl/lvgl@8.3.11
    adafruit/Adafruit PN532@1.3.4
    adafruit/Adafruit NAU7802 Library
    bblanchon/ArduinoJson@7.4.3
    lovyan03/LovyanGFX

[env:wt32-sc01-plus]
extends = env
board = esp32-s3-devkitc-1

; Flash & Partition
board_build.flash_size = 16MB
board_build.partitions = include/partitions.csv
board_upload.flash_size = 16MB

; PSRAM — Quad (nicht OPI, nicht Disabled)
board_build.arduino.memory_type = qio_qspi

; Build Flags
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM
	${env.build_flags}

; ; Custom Fonts automatisch kopieren
; extra_scripts =
;     post:copy_release.py

; SD, SPI, Preferences, WiFiClientSecure -- im ESP32-Framework enthalten

; Serieller Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
