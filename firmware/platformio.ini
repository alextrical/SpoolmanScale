[env:wt32-sc01-plus]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Flash & Partition
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB

; PSRAM — Quad (nicht OPI, nicht Disabled)
board_build.arduino.memory_type = qio_qspi

; Build Flags
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_CONF_PATH=../../../../src/lv_conf.h

; Custom Fonts automatisch kopieren
extra_scripts =
    pre:copy_fonts.py
    post:copy_release.py

; Libraries
lib_deps =
    lvgl/lvgl@8.3.11
    adafruit/Adafruit PN532@1.3.4
    adafruit/Adafruit NAU7802 Library
    bblanchon/ArduinoJson@7.4.3
    lovyan03/LovyanGFX

; SD, SPI, Preferences, WiFiClientSecure -- im ESP32-Framework enthalten

; Serieller Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
